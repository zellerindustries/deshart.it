<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--security-->

    <title>Contact Desh_Art | Fabio Lione - Digital Illustrator & Concept Artist</title>


    <meta name="description" content="Contact Fabio Lione (Desh_Art) for commissions, collaborations, or inquiries.">
    <meta name="author" content="Fabio Lione (Desh_Art)">

    <!-- ========== FAVICONS & TOUCH ICONS ========== -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="/style.css">

    <script src="/script.js" defer></script>
</head>

<body>
    <main>
        <section aria-labelledby="contact-heading" class="max-width">
            <h1 id="contact-heading">Contact Desh_Art</h1>
            <p>Use this form to request a commission, collaboration, or ask questions.</p>

            <form id="contact-form" method="post" action="#" aria-label="Contact Form">
                <fieldset>
                    <legend>Personal Information</legend>

                    <div>
                        <label for="name">Full Name <span aria-hidden="true">*</span></label>
                        <input type="text" id="name" name="name" required autocomplete="name" minlength="2"
                            maxlength="70" pattern="^[a-zA-ZÀ-ÿ\s.'-]+$" title="Please use letters only"
                            placeholder="Your full name">
                    </div>

                    <div>
                        <label for="email">Email Address <span aria-hidden="true">*</span></label>
                        <input type="email" id="email" name="email" required autocomplete="email"
                            placeholder="you@example.com">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Message</legend>
                    <div>
                        <label for="message">Message <span aria-hidden="true">*</span></label>
                        <textarea id="message" name="message" rows="5" required minlength="10" maxlength="5000"
                            placeholder="Describe your request..."></textarea>
                    </div>
                </fieldset>

                <div class="hidden-field" aria-hidden="true">
                    <label for="bot-field">Do not fill this out if you are human:</label>
                    <input type="text" id="bot-field" name="bot-field" tabindex="-1" autocomplete="off">
                </div>

                <button type="submit" id="submit-btn">Send Message</button>

                <div id="form-status" aria-live="polite"></div>
            </form>
            <div id="form-success" hidden>
                <h2>Message Sent</h2>
                <p>Thanks for reaching out. Fabio will get back to you soon.</p>

                <a href="/" class="btn btn-cta">
                    Back to portfolio
                </a>
            </div>
        </section>
    </main>
</body>

</html>
